<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandora Avatars</title>
    <link rel="icon" type="image/png" href="misc/icons8-portrait-48.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; padding: 0; 
            height: 100vh; height: 100svh; 
            width: 100vw;
            background-color: #000; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        .bg-layer {
            position: fixed; inset: 0; background-size: cover;
            background-position: center; background-attachment: fixed; z-index: -1;
        }
        .char-wrapper { position: relative; height: 55vh; aspect-ratio: 1/1; }
        .char-layer {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: contain; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
        }
        .fade-active { transition: opacity 0.6s ease-in-out; }
        .hidden-layer { opacity: 0; pointer-events: none; }
        #mainUI {
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        .content-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5rem; background: rgba(0, 0, 0, 0.4);
        }
        header { flex-grow: 1; display: flex; align-items: center; }
    </style>
</head>
<body>
    <div id="bgFront" class="bg-layer fade-active"></div>
    <div id="bgBack" class="bg-layer fade-active hidden-layer"></div>

    <div id="mainUI" class="content-layer">
        <header class="text-center">
            <h1 class="text-3xl mb-4 font-black italic tracking-tighter text-white drop-shadow-lg uppercase">
                Pandora <span class="text-emerald-400">Avatars</span>
            </h1>
        </header>

        <div class="char-wrapper">
            <img id="charFront" class="char-layer fade-active" src="" alt="">
            <img id="charBack" class="char-layer fade-active hidden-layer" src="" alt="">
        </div>

        <div class="w-full max-w-md bg-black/60 backdrop-blur-md p-6 rounded-3xl border border-white/10 shadow-2xl mb-4">
            <div class="flex flex-col gap-4">
                <input type="text" id="seedInput" placeholder="Enter a name..."
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">
                <button id="randomBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-3 rounded-xl transition-transform active:scale-95 uppercase">
                    Generate
                </button>
            </div>
        </div>
    </div>

    <script>
        const seedInput = document.getElementById('seedInput');
        const bgFront = document.getElementById('bgFront');
        const bgBack = document.getElementById('bgBack');
        const charFront = document.getElementById('charFront');
        const charBack = document.getElementById('charBack');
        const randomBtn = document.getElementById('randomBtn');
        const mainUI = document.getElementById('mainUI');

        let currentSeed = "";
        let isTransitioning = false;

        async function updateIdentity(newSeed, isInitial = false) {
            if (newSeed === currentSeed || isTransitioning) return;
            
            isTransitioning = true;
            const seed = encodeURIComponent(newSeed);

            const nextBg = `https://api.dicebear.com/9.x/glass/svg?seed=${seed}`;
            const nextChar = `https://api.dicebear.com/9.x/avataaars/svg?seed=${seed}`;

            const loadTasks = [
                new Promise(r => { const i = new Image(); i.src = nextBg; i.onload = r; }),
                new Promise(r => { const i = new Image(); i.src = nextChar; i.onload = r; })
            ];

            await Promise.all(loadTasks);

            if (isInitial) {
                bgFront.style.backgroundImage = `url('${nextBg}')`;
                charFront.src = nextChar;
                currentSeed = newSeed;
                mainUI.style.opacity = "1"; 
                isTransitioning = false;
                return;
            }

            bgBack.style.backgroundImage = `url('${nextBg}')`;
            charBack.src = nextChar;

            bgBack.classList.remove('hidden-layer');
            charBack.classList.remove('hidden-layer');
            bgFront.classList.add('hidden-layer');
            charFront.classList.add('hidden-layer');

            setTimeout(() => {
                [bgFront, bgBack, charFront, charBack].forEach(el => el.classList.remove('fade-active'));
                bgFront.style.backgroundImage = `url('${nextBg}')`;
                charFront.src = nextChar;
                bgFront.classList.remove('hidden-layer');
                charFront.classList.remove('hidden-layer');
                bgBack.classList.add('hidden-layer');
                charBack.classList.add('hidden-layer');
                void bgFront.offsetWidth;
                [bgFront, bgBack, charFront, charBack].forEach(el => el.classList.add('fade-active'));
                currentSeed = newSeed;
                isTransitioning = false;
            }, 600);
        }

        async function fetchFromDB(isInitial = false) {
            try {
                const res = await fetch('https://randomuser.me/api/');
                const data = await res.json();
                const name = data.results[0].name.first;
                seedInput.value = name;
                await updateIdentity(name, isInitial);
            } catch (e) {
                const rand = Math.random().toString(36).substring(7).toUpperCase();
                seedInput.value = rand;
                await updateIdentity(rand, isInitial);
            }
        }

        async function handleInteraction() {
            const val = seedInput.value.trim();
            if (val === "" || val === currentSeed) {
                await fetchFromDB(false);
            } else {
                await updateIdentity(val, false);
            }
        }

        randomBtn.addEventListener('click', handleInteraction);
        seedInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleInteraction();
        });

        fetchFromDB(true);
    </script>
</body>
</html>
