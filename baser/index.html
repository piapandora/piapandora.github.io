<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Encoder</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <style>
        :root { --accent: #2ecc71; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; }
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .container { 
            background: var(--panel); padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;
            width: 350px; display: flex; flex-direction: column; gap: 20px;
            text-align: center;
        }

        h2 { font-size: 16px; color: var(--accent); letter-spacing: 2px; margin: 0; font-weight: 600; }

        .file-zone {
            border: 2px dashed #333; padding: 40px 20px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
            background: rgba(255,255,255,0.02);
        }
        .file-zone.dragover { border-color: var(--accent); background: rgba(46, 204, 113, 0.05); }
        .file-zone p { font-size: 13px; color: #777; margin: 0; pointer-events: none; }

        #status { font-size: 11px; font-family: monospace; color: #555; min-height: 1.2em; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>ENCODER</h2>
    
    <label class="file-zone" id="dropZone" for="fileInput">
        <p id="fileName">Drop MP4 here<br><span style="font-size:10px; opacity:0.5">or click to browse</span></p>
        <input type="file" id="fileInput" accept="video/mp4">
    </label>

    <div id="status">Ready for payload</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileName = document.getElementById('fileName');
    const status = document.getElementById('status');

    // Drag and Drop Handlers
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, e => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length) handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        // Stricter validation: Check MIME type and file extension
        const isMp4 = file.type === "video/mp4" || file.name.toLowerCase().endsWith('.mp4');
        
        if (!isMp4) {
            status.innerText = "Error: Please use MP4";
            return;
        }

        fileName.innerText = file.name;
        status.innerText = "Encoding & Preparing Download...";

        const reader = new FileReader();
        reader.onload = () => {
            // Reconstruct the Base64 without the data header
            const encodedString = reader.result.split(',')[1];
            
            // Auto-Download as .txt
            const blob = new Blob([encodedString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "video-b64.txt"; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.innerText = `Success: ${(file.size / 1024 / 1024).toFixed(2)} MB Saved`;
        };

        reader.onerror = () => {
            status.innerText = "Error reading file";
        };

        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
