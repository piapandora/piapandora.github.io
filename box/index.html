<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIA BOX</title>
    <link rel="icon" type="image/png" href="misc/green-icon.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff41;
            --text: #d1d1d1;
            --panel: #141414;
            --border: #333;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 550px;
            background: var(--panel);
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        h2 { color: var(--accent); font-size: 1.1rem; margin: 0; }
        #fingerprint { color: #777; font-size: 0.8rem; font-weight: bold; }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.7rem; color: #999; text-transform: uppercase; }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--accent);
            padding: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: none;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover { background: var(--accent); color: #000; }
        
        #output-area {
            margin-top: 1.5rem;
            padding: 12px;
            background: #000;
            border: 1px dashed #444;
            word-break: break-all;
            min-height: 50px;
            font-size: 0.8rem;
            color: var(--text);
            cursor: pointer;
            text-transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>// PIA BOX v1.0</h2>
        <div id="fingerprint">ID: ----</div>
    </div>
    
    <div class="input-group">
        <label>MASTER PASSWORD</label>
        <input type="password" id="password" autocomplete="off" placeholder="••••••••" oninput="updateFingerprint()">
    </div>

    <div class="input-group">
        <label>INPUT (API KEY OR MAP STRING)</label>
        <textarea id="inputData" rows="4" placeholder="PASTE DATA HERE..."></textarea>
    </div>

    <div class="btn-group">
        <button onclick="runAction('encode')">GENERATE MAP</button>
        <button onclick="runAction('decode')">RECONSTRUCT KEY</button>
    </div>

    <label style="margin-top: 1.5rem; display: block;">OUTPUT (CLICK TO COPY)</label>
    <div id="output-area" onclick="copyResult()">WAITING...</div>
</div>

<script>
const Vault = (() => {
    class SeededRandom {
        constructor(seedString) {
            let h = 5381;
            for (let i = 0; i < seedString.length; i++) {
                h = ((h << 5) + h) + seedString.charCodeAt(i);
                h |= 0; 
            }
            for (let i = 0; i < 10000; i++) {
                h ^= (h << 13); h ^= (h >>> 17); h ^= (h << 5); h |= 0;
            }
            this.seed = h;
        }
        next() {
            this.seed = (1103515245 * this.seed + 12345) & 0x7FFFFFFF;
            return this.seed / 2147483648;
        }
    }

    const getTable = (pass) => {
        let table = Array.from({length: 256}, (_, i) => i);
        let rng = new SeededRandom(pass);
        for (let i = table.length - 1; i > 0; i--) {
            const j = Math.floor(rng.next() * (i + 1));
            [table[i], table[j]] = [table[j], table[i]];
        }
        return table;
    };

    return {
        fingerprint: (pass) => {
            if (!pass) return "----";
            const rng = new SeededRandom(pass);
            return (rng.seed >>> 0).toString(16).substring(0, 4).toUpperCase();
        },
        generate: (key, pass) => {
            const table = getTable(pass);
            return key.split('').map((char, i) => {
                const charCode = char.charCodeAt(0) & 0xFF;
                const keyCharIndex = table.indexOf(charCode);
                const passCharValue = pass.charCodeAt(i % pass.length);
                let shift = (keyCharIndex - passCharValue - i) % 256;
                return shift < 0 ? shift + 256 : shift;
            }).join(',');
        },
        reconstruct: (mapStr, pass) => {
            const table = getTable(pass);
            const map = mapStr.split(',').map(Number);
            return map.map((shift, i) => {
                const passCharValue = pass.charCodeAt(i % pass.length);
                let targetIndex = (shift + passCharValue + i) % 256;
                if (targetIndex < 0) targetIndex += 256;
                return String.fromCharCode(table[targetIndex % 256]);
            }).join('');
        }
    };
})();

function updateFingerprint() {
    const pass = document.getElementById('password').value;
    document.getElementById('fingerprint').innerText = "ID: " + Vault.fingerprint(pass);
}

function runAction(type) {
    const pass = document.getElementById('password').value;
    const data = document.getElementById('inputData').value;
    const out = document.getElementById('output-area');

    if (!pass || !data) { out.innerText = "MISSING DATA"; return; }

    try {
        const res = (type === 'encode') ? Vault.generate(data, pass) : Vault.reconstruct(data, pass);
        out.innerText = res;
    } catch (e) {
        out.innerText = "ERROR IN CALCULATION";
    }
}

function copyResult() {
    const text = document.getElementById('output-area').innerText;
    if (text !== "WAITING..." && text !== "MISSING DATA") {
        navigator.clipboard.writeText(text);
        const original = text;
        document.getElementById('output-area').innerText = "COPIED TO CLIPBOARD!";
        setTimeout(() => document.getElementById('output-area').innerText = original, 800);
    }
}
</script>
</body>
</html>
