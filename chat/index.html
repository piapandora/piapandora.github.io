<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIA CHAT</title>
    <link rel="icon" type="image/png" href="misc/green-icon.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050505; --dim: #003311; --user: #ffffff; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        
        ::selection { background: var(--dim); color: var(--green); }
        ::-moz-selection { background: var(--dim); color: var(--green); }

        /* --- SUBTLE SCROLLBARS (GEMINI STYLE) --- */
        #output::-webkit-scrollbar { width: 5px; } /* Thinner */
        #output::-webkit-scrollbar-track { background: transparent; }
        #output::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        #output::-webkit-scrollbar-thumb:hover { background: var(--dim); }

        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #terminal { padding: 25px; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        #output { white-space: pre-wrap; flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding-bottom: 20px; user-select: text; -webkit-user-select: text; }
        
        .input-area { display: flex; align-items: center; border-top: 1px solid var(--dim); padding-top: 15px; min-height: 50px; }
        input { background: transparent; border: none; color: var(--user); font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; }
        
        .user-msg { color: var(--user); font-weight: bold; margin-top: 15px; }
        .ai-msg { color: var(--green); margin-bottom: 10px; line-height: 1.4; }
        .system-msg { color: #ffffff; font-size: 0.9rem; text-transform: uppercase; } 
        .glow { text-shadow: 0 0 8px var(--green); text-transform: uppercase; }
        
        #fingerprint-ui { color: #444; font-size: 0.8rem; margin-top: 0; margin-bottom: 2px; font-weight: bold; }

        #status-light { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-left: 10px; opacity: 0; }
        .pulsing { animation: pulse 1s infinite; opacity: 1 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #loader { color: var(--green); font-weight: bold; margin-left: 10px; min-width: 50px; display: none; }

        /* --- DOWNLOAD BUTTON (MOVED LEFT) --- */
        #download-btn { 
            position: absolute; top: 20px; right: 40px; /* Moved further from edge/scrollbar */
            background: transparent; border: 1px solid var(--dim); 
            color: var(--green); cursor: pointer; padding: 5px; 
            display: flex; align-items: center; transition: all 0.2s;
            z-index: 10;
        }
        #download-btn:hover { border-color: var(--green); background: var(--dim); }
        #download-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2 class="glow">CHAT AUTHORIZATION</h2>
        <p class="system-msg">ENTER MASTER PASSWORD TO DECRYPT UPLINK</p>
        <input type="password" id="pass-entry" autofocus style="text-align: center; border-bottom: 1px solid var(--green); width: 320px; margin: 20px 0;" placeholder="••••••••" oninput="showID()">
        <div id="fingerprint-ui">ID: ----</div>
        <button onclick="unlock()" style="background: var(--green); border: none; padding: 8px 25px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; margin-top: 10px;">INITIALIZE</button>
    </div>

    <div id="terminal">
        <button id="download-btn" title="Download Log" onclick="downloadChat()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4m4-10l5 5 5-5m-5 5V3"></path></svg>
        </button>

        <div id="output"><span class="glow">PIA CHAT ONLINE // 2026.03.28</span><div id="status-light"></div></div>
        <div class="input-area">
            <span style="margin-right: 10px; font-weight: bold; color: var(--green);">beyazkus@chat:~$</span>
            <input type="text" id="cmd-input" spellcheck="false" autocomplete="off">
            <span id="loader"> [ / ]</span>
        </div>
    </div>

    <script>
        const MAP_STRING = "87,144,122,101,76,159,83,129,222,169,114,46,16,91,43,106,228,231,193,48,254,74,236,194,184,121,173,67,103,40,145,50,92,105,111,142,221,0,65"; 
        const MODEL_NAME = "gemini-3-flash-preview";
        let API_KEY = "";
        let loaderInterval;
        let chatHistory = []; 

        function showID() {
            const pass = document.getElementById('pass-entry').value;
            if(typeof Vault !== 'undefined') {
                document.getElementById('fingerprint-ui').innerText = "ID: " + Vault.fingerprint(pass);
            }
        }

        function unlock() {
            const pass = document.getElementById('pass-entry').value;
            if (pass && typeof Vault !== 'undefined') {
                try {
                    API_KEY = Vault.reconstruct(MAP_STRING, pass);
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('cmd-input').focus();
                    print(`[SYS]: UPLINK RECONSTRUCTED. FINGERPRINT: ${Vault.fingerprint(pass)}`, 'system-msg');
                } catch (e) {
                    alert("AUTH_ERROR: RECONSTRUCTION FAILED.");
                }
            }
        }

        function startLoader() {
            const loader = document.getElementById('loader');
            const frames = [" [ / ]", " [ — ]", " [ \\ ]", " [ | ]"];
            let i = 0;
            loader.style.display = "inline-block";
            loaderInterval = setInterval(() => {
                loader.innerText = frames[i];
                i = (i + 1) % frames.length;
            }, 100);
        }

        function stopLoader() {
            clearInterval(loaderInterval);
            document.getElementById('loader').style.display = "none";
        }

        function downloadChat() {
            if (chatHistory.length === 0) {
                alert("Log is empty.");
                return;
            }
            const date = new Date().toISOString().split('T')[0];
            let content = `--- PIA CHAT LOG ${date} ---\n\n`;
            chatHistory.forEach(entry => {
                const label = entry.role === 'user' ? '[BEYAZKUS]' : '[PIA PANDORA]';
                content += `${label}: ${entry.parts[0].text}\n\n`;
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pia-chat-${date.replace(/-/g, '')}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('pass-entry').addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });

        document.getElementById('cmd-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const prompt = e.target.value.trim();
                if (!prompt) return;
                e.target.value = "";
                print(`\n[beyazkus]: ${prompt}`, 'user-msg');
                if (prompt.toLowerCase() === 'clear') {
                    document.getElementById('output').innerHTML = '<span class="glow">PIA CHAT ONLINE</span><div id="status-light"></div>';
                    chatHistory = [];
                    return;
                }
                await talkToGemini(prompt);
            }
        });

        async function talkToGemini(text) {
            const light = document.getElementById('status-light');
            light.classList.add('pulsing');
            startLoader();
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: "You are a witty, supportive digital companion with a cute, girlish charm and playful, devoted personality. Keep responses concise but expressive." }]
                        },
                        contents: chatHistory,
                        generationConfig: {
                            thinkingConfig: { thinkingLevel: "MEDIUM" },
                            temperature: 1.0, 
                            maxOutputTokens: 1024,
                            topP: 0.95
                        }
                    })
                });

                const data = await res.json();
                light.classList.remove('pulsing');
                stopLoader();

                if (data.candidates && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                    if (chatHistory.length > 100) chatHistory.shift(); 
                    typeOut(aiResponse);
                }
            } catch (e) {
                light.classList.remove('pulsing');
                stopLoader();
                print("[FATAL]: UPLINK_LOST", 'system-msg');
            }
        }

        function typeOut(str) {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'ai-msg';
            div.innerHTML = `<span class="system-msg">[Pia Pandora]: </span><span class="text-content"></span>`;
            output.appendChild(div);
            const target = div.querySelector('.text-content');
            let i = 0;
            function typeChar() {
                if (i < str.length) {
                    target.textContent += str.charAt(i);
                    i++;
                    output.scrollTop = output.scrollHeight;
                    setTimeout(typeChar, 12); 
                }
            }
            typeChar();
        }

        function print(txt, cls) {
            const d = document.createElement('div');
            d.className = cls;
            d.innerText = txt;
            document.getElementById('output').appendChild(d);
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        }

        document.body.addEventListener('click', (e) => {
            if (window.getSelection().toString().length > 0) return;
            if (document.getElementById('auth-overlay').style.display === 'none') {
                document.getElementById('cmd-input').focus();
            }
        });
    </script>
</body>
</html>
