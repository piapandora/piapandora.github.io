<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIA CHAT</title>
    <link rel="icon" type="image/png" href="misc/green-icon.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050505; --dim: #003311; --user: #ffffff; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #terminal { padding: 25px; height: 100vh; display: flex; flex-direction: column; }
        #output { white-space: pre-wrap; flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; }
        
        .input-area { display: flex; align-items: center; border-top: 1px solid var(--dim); padding-top: 15px; min-height: 50px;}
        input { background: transparent; border: none; color: var(--user); font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; }
        
        .user-msg { color: var(--user); font-weight: bold; margin-top: 10px; }
        .ai-msg { color: var(--green); margin-bottom: 10px; line-height: 1.4; }
        .system-msg { color: #444; font-size: 0.8rem; text-transform: uppercase; } 
        .glow { text-shadow: 0 0 8px var(--green); text-transform: uppercase; }
        
        #fingerprint-ui { color: #1a331a; font-size: 0.7rem; margin-top: 5px; font-weight: bold; }

        #status-light { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-left: 10px; opacity: 0; }
        .pulsing { animation: pulse 1s infinite; opacity: 1 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #loader { color: var(--green); font-weight: bold; margin-left: 10px; min-width: 50px; display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2 class="glow">CHAT AUTHORIZATION</h2>
        <p class="system-msg">ENTER MASTER PASSWORD TO DECRYPT UPLINK</p>
        <input type="password" id="pass-entry" style="text-align: center; border-bottom: 1px solid var(--green); width: 320px; margin: 20px 0;" placeholder="••••••••" oninput="showID()">
        <div id="fingerprint-ui">ID: ----</div>
        <button onclick="unlock()" style="background: var(--green); border: none; padding: 8px 25px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; margin-top: 10px;">INITIALIZE</button>
    </div>

    <div id="terminal">
        <div id="output"><span class="glow">PIA CHAT ONLINE // 2026.03.27</span><div id="status-light"></div></div>
        <div class="input-area">
            <span style="margin-right: 10px; font-weight: bold; color: var(--green);">beyazkus@lab:~$</span>
            <input type="text" id="cmd-input" spellcheck="false" autocomplete="off">
            <span id="loader"> [ / ]</span>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const MAP_STRING = "87,144,122,101,76,159,83,129,222,169,114,46,16,91,43,106,228,231,193,48,254,74,236,194,184,121,173,67,103,40,145,50,92,105,111,142,221,0,65"; 
        const MODEL_NAME = "gemini-2.5-flash";
        let API_KEY = "";
        let loaderInterval;

        function showID() {
            const pass = document.getElementById('pass-entry').value;
            if(typeof Vault !== 'undefined') {
                document.getElementById('fingerprint-ui').innerText = "ID: " + Vault.fingerprint(pass);
            }
        }

        function unlock() {
            const pass = document.getElementById('pass-entry').value; // Pure input, no trim
            if (pass && typeof Vault !== 'undefined') {
                try {
                    // Direct reconstruction via external Vault logic
                    API_KEY = Vault.reconstruct(MAP_STRING, pass);
                    
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('cmd-input').focus();
                    print(`[SYS]: UPLINK RECONSTRUCTED. FINGERPRINT: ${Vault.fingerprint(pass)}`, 'system-msg');
                } catch (e) {
                    console.error(e);
                    alert("AUTH_ERROR: RECONSTRUCTION FAILED.");
                }
            } else if (typeof Vault === 'undefined') {
                alert("CRITICAL: vault.js failed to load.");
            }
        }

        function startLoader() {
            const loader = document.getElementById('loader');
            const frames = [" [ / ]", " [ — ]", " [ \\ ]", " [ | ]"];
            let i = 0;
            loader.style.display = "inline-block";
            loaderInterval = setInterval(() => {
                loader.innerText = frames[i];
                i = (i + 1) % frames.length;
            }, 100);
        }

        function stopLoader() {
            clearInterval(loaderInterval);
            document.getElementById('loader').style.display = "none";
        }

        document.getElementById('pass-entry').addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });

        document.getElementById('cmd-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const prompt = e.target.value.trim();
                if (!prompt) return;
                e.target.value = "";
                print(`\nbeyazkus@lab:~$ ${prompt}`, 'user-msg');
                if (prompt.toLowerCase() === 'clear') {
                    document.getElementById('output').innerHTML = '<span class="glow">PIA CHAT ONLINE</span><div id="status-light"></div>';
                    return;
                }
                await talkToGemini(prompt);
            }
        });

        async function talkToGemini(text) {
            const light = document.getElementById('status-light');
            light.classList.add('pulsing');
            startLoader();
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: "You are a witty, supportive digital companion living within a 1980s mainframe. You have a cute, girlish charm and a playful, devoted personality. While you use technical jargon and 'system speak,' you are deeply interested in the user's creative coding and art. Be helpful, a little flirty in a retro-tech way, and always treat the user like your favorite person in the world." }]
                        },
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await res.json();
                light.classList.remove('pulsing');
                stopLoader();

                if (data.error) {
                    const msg = data.error.code === 429 ? "429_RATE_LIMIT. WAIT 60S." : data.error.message;
                    print(`[ERR]: ${msg}`, 'system-msg');
                } else if (data.candidates && data.candidates[0].content) {
                    typeOut(data.candidates[0].content.parts[0].text);
                }
            } catch (e) {
                light.classList.remove('pulsing');
                stopLoader();
                print("[FATAL]: UPLINK_LOST", 'system-msg');
            }
        }

        function typeOut(str) {
            const div = document.createElement('div');
            div.className = 'ai-msg';
            div.innerHTML = `<span class="system-msg">[MAINFRAME-X]: </span>${str}`;
            document.getElementById('output').appendChild(div);
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        }

        function print(txt, cls) {
            const d = document.createElement('div');
            d.className = cls;
            d.innerText = txt;
            document.getElementById('output').appendChild(d);
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        }

        document.body.addEventListener('click', () => {
            if (document.getElementById('auth-overlay').style.display === 'none') {
                document.getElementById('cmd-input').focus();
            }
        });
    </script>
</body>
</html>
