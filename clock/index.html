<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIA CLOCK</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; }
        canvas { display: block; filter: blur(0.5px) contrast(1.2); }
        .hide-cursor { cursor: none; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];
        let timeStr = "";

        // UI Features
        let cursorTimer;
        window.addEventListener('mousemove', () => {
            document.body.classList.remove('hide-cursor');
            clearTimeout(cursorTimer);
            cursorTimer = setTimeout(() => document.body.classList.add('hide-cursor'), 1000);
        });

        window.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        });

        function updateTime() {
            const now = new Date();
            const str = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Istanbul',
                hour: '2-digit', minute: '2-digit', hour12: false
            }).format(now);
            
            // Replace the colon with a space
            timeStr = str.replace(':', '•');
        }
        setInterval(updateTime, 1000);
        updateTime();

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            // High particle count so they are always visible in the digits
            particles = Array.from({length: 2000}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                speed: 1 + Math.random() * 2,
                angle: Math.random() * Math.PI * 2
            }));
        }

        function draw() {
            // 1. We work on a hidden "buffer" or just manage the composite order
            ctx.globalCompositeOperation = 'source-over';
            
            // Subtle fade for trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, w, h);

            // 2. Draw ALL snakes across the whole screen
            particles.forEach(p => {
                p.angle += (Math.random() - 0.5) * 0.5;
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
                if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;

                ctx.fillStyle = '#00ff41';
                ctx.fillRect(p.x, p.y, 2, 2);
            });

            // 3. APPLY THE MASK
            // This says: "Keep what I draw next, and only keep the snakes that are underneath it."
            ctx.globalCompositeOperation = 'destination-in';
            const fontSize = w * 0.25;
            ctx.font = `900 ${fontSize}px Arial Black, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white'; // Color doesn't matter for destination-in, just opacity
            ctx.fillText(timeStr, w / 2, h / 2);

            // 4. DRAW THE OUTLINE (on top of everything)
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = '#003300';
            ctx.lineWidth = 3;
            ctx.strokeText(timeStr, w / 2, h / 2);

            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
