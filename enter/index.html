<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pia Pandora | App Collection</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/piapandora/micro-logo.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <script src="https://piapandora.com/piapandora/home.js"></script>
    <script src="https://piapandora.com/shift/reshift.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { 
            --accent: #2ecc71; 
            --bg: #1a1a1a; 
            --panel: #242424; 
            --text: #e0e0e0; 
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        .auth-overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            gap: 20px; 
        }

        .auth-card { 
            background: var(--panel); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid #333; 
            width: 300px;
        }

        input { 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #121212; 
            color: white; 
            width: 100%; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.2s; 
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: var(--accent); 
            border: none; 
            color: #000; 
            border-radius: 6px; 
            font-weight: 600; 
            transition: opacity 0.2s; 
            font-size: 14px; 
            width: 100%;
            margin-top: 5px;
        }

        button:hover { opacity: 0.9; }

        .brand { 
            font-weight: 600; 
            font-size: 22px; 
            letter-spacing: 4px;
            margin-bottom: 10px; 
            color: #fff;
        }

        #info { 
            font-size: 11px; 
            color: #777; 
            font-family: monospace; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>

<div id="auth" class="auth-overlay">
    <div class="auth-card">
        <div class="brand">THE ISLAND</div>
        <input type="text" id="appInput" placeholder="app-name" autofocus autocomplete="off" spellcheck="false">
        <input type="password" id="passInput" placeholder="password" autocomplete="off" spellcheck="false">
        <button id="unlockBtn">Enter</button>
        <div id="info">ID: <span id="fp">----</span></div>
    </div>
</div>

<script>
    const MAP_STRING = "216,206,230,83,181,229,172,146,215,210,154,159,74,222,220,196,193,211,236,30,198,12,235,231,235,207,203,200,3,200,111,134,121,164";
    
    const manny = {
        "FC88": "https://piapandora.com/island/1777154201002.pfs", // tb
        "706A": "https://piapandora.com/island/1777254453465.pfs", // ip
        "F128": "https://piapandora.com/island/1777327801634.pfs" // pn - not upladed yet
    };

    const appInput = document.getElementById('appInput');
    const passInput = document.getElementById('passInput');
    const fpDisplay = document.getElementById('fp');
    let imprint = "";

    appInput.addEventListener('input', (e) => {
        const normalizedApp = e.target.value.toLowerCase().trim();
        imprint = Vault.fingerprint(normalizedApp);
    });

    passInput.addEventListener('input', (e) => {
        fpDisplay.innerText = Vault.fingerprint(e.target.value);
    });

    document.getElementById('unlockBtn').onclick = enterIsland;
    [appInput, passInput].forEach(el => {
        el.addEventListener('keypress', (e) => { if(e.key === 'Enter') enterIsland(); });
    });

    async function enterIsland() {
        const app = appInput.value.toLowerCase().trim();
        const pass = passInput.value;

        if (!app || !pass) return;

        const currentImprint = Vault.fingerprint(app);

        try {
            // 1. Resolve Path via Manny
            const pfsPath = manny[currentImprint];
            if (!pfsPath) throw new Error("PATH ERR");

            // 2. Vault Reconstruction
            let vaultKey = Vault.reconstruct(MAP_STRING, pass);
            if (!vaultKey) throw new Error("AUTH FAIL");

            // 3. Fetch Resolved PFS
            const response = await fetch(pfsPath);
            if (!response.ok) throw new Error("FETCH FAIL");
            const pfsBlob = await response.blob();

            // 4. Reshift Decryption
            const decryptedZipBlob = await Reshift.reconstruct(pfsBlob, vaultKey);
            
            // 5 Security Wipe
            vaultKey = null;
            imprint = ""; 
            fpDisplay.innerText = "----";

            // 6. Unzip and Flatten Assets
            const zip = await JSZip.loadAsync(decryptedZipBlob);
            const blobLibrary = {};
            let htmlContent = "";

            const fileKeys = Object.keys(zip.files);

            for (let fullPath of fileKeys) {
                if (zip.files[fullPath].dir) continue;
                const filename = fullPath.split('/').pop();
                if (filename.startsWith('.')) continue;

                if (filename.toLowerCase() === 'index.html') {
                    htmlContent = await zip.file(fullPath).async("string");
                } else {
                    const fileData = await zip.file(fullPath).async("blob");
                    blobLibrary[filename] = URL.createObjectURL(fileData);
                }
            }

            if (!htmlContent) throw new Error("INDEX NOT FOUND");

            // 7. Deterministic Hydration
            const sortedAssetNames = Object.keys(blobLibrary).sort((a, b) => b.length - a.length);

            for (let name of sortedAssetNames) {
                const url = blobLibrary[name];
                htmlContent = htmlContent.split(name).join(url);
            }

            // 8. Final Launch
            document.open();
            document.write(htmlContent);
            document.close();

        } catch (e) {
            console.error(e);
            appInput.value = "";
            passInput.value = "";
            appInput.placeholder = "";
            passInput.placeholder = "";
            setTimeout(() => {
                appInput.placeholder = "app-name";
                passInput.placeholder = "password";
                fpDisplay.innerText = "----";
            }, 1000);
        }
    }
</script>

</body>
</html>
