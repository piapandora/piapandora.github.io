<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Island Generator</title>
    <link rel="icon" type="image/png" href="https://www.piapandora.com/box/misc/green-icon.png">
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 0; }
        .container { display: flex; gap: 20px; }
        canvas { background: #000; border: 1px solid #555; cursor: crosshair; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { background: #333; padding: 20px; border-radius: 8px; width: 240px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        
        .brush-picker { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin-bottom: 12px; 
            margin-top: 8px; 
        }

        .brush-btn, .action-btn {
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, filter 0.1s, box-shadow 0.1s;
            border: 2px solid #333;
        }

        .brush-btn { 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 0.9em; 
            text-align: center; 
        }

        .brush-btn:hover, .action-btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.2); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .brush-btn.active { 
            box-shadow: 0 0 0 2px #fff;
            transform: translateY(-1px);
        }

        button.action-btn { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0; 
            border-radius: 8px; 
            font-size: 0.9em;
        }

        #genBtn { background: #388e3c; color: white; }
        #clearBtn { background: #d32f2f; color: white; }
        #smoothBtn { background: #1976d2; color: white; }
        #exportBtn { background: #7b1fa2; color: white; }
        
        input[type=text] { 
            box-sizing: border-box; 
            margin-top: 10px; 
            margin-bottom: 8px; 
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: 98%;
            padding: 11px;
            background: #444;
            border: 1px solid #555;
            color: white; 
            border-radius: 8px; 
            font-size: 1em;
        }

        label { font-size: 0.75em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .legend { font-size: 0.8em; margin-top: 10px; border-top: 1px solid #444; padding-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="mapCanvas" width="500" height="500"></canvas>
        <div class="controls">
            <label>Map Seed</label>
            <input type="text" id="seedInput" placeholder="Enter seed...">
            
            <button id="genBtn" class="action-btn">🎲 Generate Island</button>
            <button id="smoothBtn" class="action-btn">✨ Toggle Smooth</button>
            <button id="clearBtn" class="action-btn">🗑️ Clear Map</button>
            
            <hr style="border:0; border-top:1px solid #444; margin: 15px 0;">
            
            <label>Draw Terrain</label>
            <div class="brush-picker">
                <div class="brush-btn" data-val="0" style="background:#004466; color:#fff">Sea</div>
                <div class="brush-btn" data-val="1" style="background:#e3c48d; color:#000">Beach</div>
                <div class="brush-btn" data-val="2" style="background:#2d8a2d; color:#fff">Forest</div>
                <div class="brush-btn" data-val="3" style="background:#eeeeee; color:#000">Peak</div>
            </div>

            <hr style="border:0; border-top:1px solid #444; margin: 5px 0 12px 0;">

            <label>Export</label>
            <div style="margin-top: 8px;">
                <button id="exportBtn" class="action-btn">📸 Heightmap</button>
            </div>
            
            <div class="legend">
                <p>💡 Tip: Drag to paint terrain.</p>
            </div>
        </div>
    </div>

<script>
    const GRID_SIZE = 10;
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    let isSmooth = true;
    let currentBrush = null; 
    
    let grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
    let beachNoise = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));

    function cyrb128(str) {
        let h1 = 1779033703, h2 = 2776037359, h3 = 669991377, h4 = 25311071;
        for (let i = 0, k; i < str.length; i++) {
            k = str.charCodeAt(i);
            h1 = h2 ^ Math.imul(h1 ^ k, 597399067); h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
            h3 = h4 ^ Math.imul(h3 ^ k, 951274213); h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
        }
        return [(h1^h2^h3^h4)>>>0, (h2^h1)>>>0, (h3^h1)>>>0, (h4^h1)>>>0];
    }

    function sfc32(a, b, c, d) {
        return function() {
            a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0; 
            var t = (a + b | 0) + d | 0; d = d + 1 | 0;
            a = b ^ b >>> 9; b = c + (c << 3) | 0;
            c = (c << 21 | c >>> 11); c = c + t | 0;
            return (t >>> 0) / 4294967296;
        }
    }

    function getColor(h, noise) {
        let beachThreshold = 0.4 + (noise * 0.4); 
        if (h < beachThreshold) return [0, 68, 102];    
        if (h < 1.1)             return [227, 196, 141]; 
        if (h < 2.25)           return [45, 138, 45];   
        return [255, 255, 255];                         
    }

    function draw() {
        ctx.clearRect(0, 0, 500, 500);
        if (!isSmooth) {
            const box = 500 / GRID_SIZE;
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    const [r,g,b] = getColor(grid[x][y], beachNoise[x][y]);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x * box, y * box, box, box);
                }
            }
        } else {
            const imgData = ctx.createImageData(500, 500);
            for (let i = 0; i < 500; i++) {
                for (let j = 0; j < 500; j++) {
                    let gx = (i / 500) * (GRID_SIZE - 1);
                    let gy = (j / 500) * (GRID_SIZE - 1);
                    let x0 = Math.floor(gx), x1 = Math.min(x0 + 1, GRID_SIZE - 1);
                    let y0 = Math.floor(gy), y1 = Math.min(y0 + 1, GRID_SIZE - 1);
                    let tx = gx - x0, ty = gy - y0;

                    let h = (1-tx)*(1-ty)*grid[x0][y0] + tx*(1-ty)*grid[x1][y0] + (1-tx)*ty*grid[x0][y1] + tx*ty*grid[x1][y1];
                    let n = (1-tx)*(1-ty)*beachNoise[x0][y0] + tx*(1-ty)*beachNoise[x1][y0] + (1-tx)*ty*beachNoise[x0][y1] + tx*ty*beachNoise[x1][y1];
                    
                    const [r, g, b] = getColor(h, n);
                    const idx = (j * 500 + i) * 4;
                    imgData.data[idx] = r; imgData.data[idx+1] = g; imgData.data[idx+2] = b; imgData.data[idx+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }
    }

    function generate() {
        currentBrush = null;
        document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
        let inputField = document.getElementById('seedInput');
        if (!inputField.value) inputField.value = Math.random().toString(36).substring(7);
        let seedValues = cyrb128(inputField.value);
        let rand = sfc32(seedValues[0], seedValues[1], seedValues[2], seedValues[3]);

        for(let x=0; x<GRID_SIZE; x++) {
            for(let y=0; y<GRID_SIZE; y++) {
                let dist = Math.sqrt(Math.pow(x-4.5, 2) + Math.pow(y-4.5, 2));
                grid[x][y] = dist < (GRID_SIZE * 0.4) ? Math.floor(rand() * 4) : 0;
                beachNoise[x][y] = rand();
            }
        }
        draw();
    }

    function exportHeightmap() {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = GRID_SIZE;
        exportCanvas.height = GRID_SIZE;
        const eCtx = exportCanvas.getContext('2d');
        const imgData = eCtx.createImageData(GRID_SIZE, GRID_SIZE);

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const val = Math.floor((grid[x][y] / 3) * 255);
                const idx = (y * GRID_SIZE + x) * 4;
                imgData.data[idx] = val; imgData.data[idx+1] = val; imgData.data[idx+2] = val; imgData.data[idx+3] = 255;
            }
        }
        eCtx.putImageData(imgData, 0, 0);
        const link = document.createElement('a');
        link.download = `island-${document.getElementById('seedInput').value}.png`;
        link.href = exportCanvas.toDataURL();
        link.click();
    }

    let isDrawing = false;
    function paint(e) {
        if (!isDrawing || currentBrush === null) return;

        const rect = canvas.getBoundingClientRect();
        const ratioX = (e.clientX - rect.left) / rect.width;
        const ratioY = (e.clientY - rect.top) / rect.height;

        const x = Math.floor(Math.max(0, Math.min(0.999, ratioX)) * GRID_SIZE);
        const y = Math.floor(Math.max(0, Math.min(0.999, ratioY)) * GRID_SIZE);

        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
            if (grid[x][y] !== currentBrush) {
                grid[x][y] = currentBrush;
                beachNoise[x][y] = currentBrush > 0 ? 0.5 : 0;
                draw();
            }
        }
    }

    canvas.onmousedown = (e) => { isDrawing = true; paint(e); };
    window.onmouseup = () => { isDrawing = false; };
    canvas.onmousemove = paint;

    document.querySelectorAll('.brush-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentBrush = parseInt(btn.dataset.val);
        };
    });

    document.getElementById('genBtn').onclick = () => {
        document.getElementById('seedInput').value = ""; 
        generate();
    };
    
    document.getElementById('smoothBtn').onclick = () => { isSmooth = !isSmooth; draw(); };
    document.getElementById('exportBtn').onclick = exportHeightmap;
    document.getElementById('clearBtn').onclick = () => {
        grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
        draw();
    };

    document.getElementById('seedInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generate();
    });

    generate();
</script>
</body>
</html>
