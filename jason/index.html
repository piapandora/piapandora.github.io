<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason's Pangea</title>
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        :root { --bg: #0b0b0c; --card: #1c1c1e; --accent: #0a84ff; --text: #f5f5f7; --text-dim: #86868b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        #drop-zone { background: var(--card); border: 2px dashed #3a3a3c; border-radius: 24px; padding: 80px 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        #drop-zone.hover { border-color: var(--accent); background: #242426; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 0; }
        
        .controls { margin-top: 20px; display: grid; gap: 1px; background: #3a3a3c; border-radius: 14px; overflow: hidden; }
        .toggle-group { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 16px; }
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3a3a3c; transition: .3s; border-radius: 34px; }
        input:checked + .slider { background-color: var(--accent); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(18px); }

        .status { margin-top: 24px; text-align: center; color: var(--accent); min-height: 1.2em; font-size: 14px; }
        #action-btn { display: none; margin-top: 20px; cursor: pointer; background: var(--accent); color: white; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div id="drop-zone"><h1>Jason's Pangea</h1><p>Drop Here</p></div>

    <div class="controls">
        <div class="toggle-group">
            <span>Auto Jason</span>
            <label class="switch"><input type="checkbox" id="toggle-json" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Auto Pangea</span>
            <label class="switch"><input type="checkbox" id="toggle-img" checked><span class="slider"></span></label>
        </div>
    </div>

    <div id="status-msg" class="status"></div>
    <div id="action-btn">Download Now</div>
</div>

<script>
    const KEY = Vault.reconstruct("216,66,144,79,167,137,34,128,59,153,227,255,59", Vault.fingerprint.name + Vault.generate.name + Vault.reconstruct.name);
    let autoJson = true, autoImg = true, pendingFile = null;

    document.getElementById('toggle-json').addEventListener('change', e => autoJson = e.target.checked);
    document.getElementById('toggle-img').addEventListener('change', e => autoImg = e.target.checked);

    function xorCipher(text) {
        let res = "";
        for (let i = 0; i < text.length; i++) res += String.fromCharCode(text.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length));
        return res;
    }

    const dropZone = document.getElementById('drop-zone'), statusMsg = document.getElementById('status-msg'), actionBtn = document.getElementById('action-btn');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('hover'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
        actionBtn.style.display = 'none';
        const reader = new FileReader();
        const ext = file.name.split('.').pop();

        if (file.type.startsWith('image/')) {
            reader.readAsDataURL(file);
            reader.onload = () => {
                const manifest = { t: file.type, e: ext };
                const output = { m: btoa(xorCipher(JSON.stringify(manifest))), b: btoa(xorCipher(reader.result.split(',')[1])) };
                const blob = new Blob([JSON.stringify(output)], {type: 'application/json'});
                const url = URL.createObjectURL(blob), name = `jp-${Date.now()}.json`;
                
                if (autoJson) triggerDownload(url, name);
                else { pendingFile = { url, name }; statusMsg.innerText = "Ready!"; actionBtn.style.display = 'block'; }
            };
        } else {
            reader.readAsText(file);
            reader.onload = () => {
                try {
                    const obj = JSON.parse(reader.result);
                    const manifest = JSON.parse(xorCipher(atob(obj.m)));
                    const data = `data:${manifest.t};base64,${xorCipher(atob(obj.b))}`;
                    const url = data, name = `jp-${Date.now()}.${manifest.e}`;
                    
                    if (autoImg) triggerDownload(url, name);
                    else { pendingFile = { url, name }; statusMsg.innerText = "Ready!"; actionBtn.style.display = 'block'; }
                } catch(e) { statusMsg.innerText = "Error: Invalid Key/File."; }
            };
        }
    }

    actionBtn.addEventListener('click', () => { triggerDownload(pendingFile.url, pendingFile.name); actionBtn.style.display = 'none'; });
    function triggerDownload(u, n) { const a = document.createElement('a'); a.href = u; a.download = n; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
</script>
</body>
</html>
