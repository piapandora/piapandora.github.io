<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly PDF</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #0b0b0c; --card: #1c1c1e; --accent: #0a84ff; --text: #f5f5f7; --text-dim: #86868b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        
        #drop-zone { 
            background: var(--card); 
            border: 2px dashed #3a3a3c; 
            border-radius: 24px; 
            padding: 80px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s; 
            position: relative; 
            overflow: hidden;
        }
        #drop-zone.hover { border-color: var(--accent); background: #242426; }
        
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 0; }
        
        .controls { margin-top: 20px; display: grid; gap: 1px; background: #3a3a3c; border-radius: 14px; overflow: hidden; }
        .toggle-group { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 16px; }
        
        .status { margin-top: 24px; text-align: center; color: var(--accent); min-height: 1.2em; font-size: 14px; font-weight: 500; }
        
        #action-btn { 
            display: none; 
            margin-top: 20px; 
            cursor: pointer; 
            background: var(--accent); 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: 600; 
        }

        #progress-container { 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%; 
            background: #3a3a3c; 
            height: 6px; 
            display: none; 
        }
        #progress-bar { width: 0%; background: var(--accent); height: 100%; transition: width 0.1s; }
        
        /* Hidden canvas for processing */
        #offscreen-canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="drop-zone">
        <h1>Polly PDF</h1>
        <p id="drop-text">Drop PDF to extract JPGs</p>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="controls">
        <div class="toggle-group">
            <span>Quality</span>
            <span style="color: var(--text-dim); font-size: 12px;">150 DPI (Optimized)</span>
        </div>
        <div class="toggle-group">
            <span>Format</span>
            <span style="color: var(--text-dim); font-size: 12px;">JPG (.zip)</span>
        </div>
    </div>

    <div id="status-msg" class="status">Ready</div>
    <div id="action-btn">Download ZIP</div>
</div>

<canvas id="offscreen-canvas"></canvas>

<script>
    // PDF.js worker setup
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const dropZone = document.getElementById('drop-zone');
    const statusMsg = document.getElementById('status-msg');
    const actionBtn = document.getElementById('action-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const canvas = document.getElementById('offscreen-canvas');
    const ctx = canvas.getContext('2d');

    let currentZipBlob = null;

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault(); 
        dropZone.classList.remove('hover');
        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") {
            await processPDF(file);
        } else {
            statusMsg.innerText = "Please drop a valid PDF file.";
        }
    });

    // Clicking the drop zone also opens file selector
    dropZone.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/pdf';
        input.onchange = e => {
            if (e.target.files[0]) processPDF(e.target.files[0]);
        };
        input.click();
    });

    async function processPDF(file) {
        statusMsg.innerText = "Initializing...";
        progressContainer.style.display = 'block';
        actionBtn.style.display = 'none';
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const zip = new JSZip();
            const totalPages = pdf.numPages;

            for (let i = 1; i <= totalPages; i++) {
                statusMsg.innerText = `Processing Page ${i} of ${totalPages}...`;
                
                // 1. Load Page
                const page = await pdf.getPage(i);
                
                // 2. Calculate Scale for 150 DPI (standard PDF is 72 DPI)
                const scale = 150 / 72;
                const viewport = page.getViewport({ scale });

                // 3. Prepare Canvas
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // 4. Render to Canvas
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // 5. Export to JPEG Blob (0.8 quality for size/quality balance)
                const imgBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                
                // 6. Add to Zip
                const fileName = `page-${String(i).padStart(3, '0')}.jpg`;
                zip.file(fileName, imgBlob);

                // Update UI
                progressBar.style.width = `${(i / totalPages) * 100}%`;
                
                // Small timeout to keep UI responsive
                await new Promise(r => setTimeout(r, 10));
            }

            statusMsg.innerText = "Finalizing ZIP...";
            currentZipBlob = await zip.generateAsync({ type: "blob" });
            
            statusMsg.innerText = `Success: ${totalPages} pages processed.`;
            actionBtn.style.display = 'block';
            
        } catch (err) {
            console.error(err);
            statusMsg.innerText = "Error processing PDF.";
        } finally {
            setTimeout(() => { progressContainer.style.display = 'none'; progressBar.style.width = '0%'; }, 2000);
        }
    }

    actionBtn.addEventListener('click', () => {
        if (!currentZipBlob) return;
        const url = URL.createObjectURL(currentZipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Polly-${Date.now()}.zip`;
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
    });
</script>

</body>
</html>
