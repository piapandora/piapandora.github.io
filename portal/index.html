<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIA PORTAL</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        :root { 
            --accent: #2ecc71; 
            --bg: #050505; 
            --text: #00ff41; 
            --gutter: 40px; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); color: var(--text); 
            font-family: monospace; overflow: hidden;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            height: 100vh;
            width: 100vw;
            padding: var(--gutter);
            gap: var(--gutter);
            box-sizing: border-box;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .drop-zone {
            border: 1px dashed #333;
            width: 100%;
            height: 100%;
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-sizing: border-box;
        }

        .drop-zone.active { 
            border-color: var(--accent); 
            background: rgba(46, 204, 113, 0.08); 
            transform: scale(1.01);
        }
        
        p { 
            letter-spacing: 8px; 
            font-weight: bold; 
            margin: 0; 
            pointer-events: none; 
            color: #333; 
            transition: 0.2s; 
        }
        
        .drop-zone.active p { 
            color: var(--accent);
            opacity: 1; 
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .drop-zone:hover { border-color: #555; background: rgba(255, 255, 255, 0.01); }
        .drop-zone:hover p { color: #444; }

        input { display: none; }
    </style>
</head>
<body>

<div class="portal-grid" id="grid"></div>
<input type="file" id="fileInput">

<script>
    const grid = document.getElementById('grid');
    const fileInput = document.getElementById('fileInput');
    const maps = ["uno", "due", "tre", "qua", "cin", "sei", "set", "ott", "nov"];
    let activeMap = "";

    maps.forEach((mapName, index) => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const zone = document.createElement('label');
        zone.className = 'drop-zone';
        zone.dataset.map = `${mapName}.csv`;
        zone.dataset.label = mapName.toUpperCase();
        
        const text = document.createElement('p');
        text.innerText = zone.dataset.label; 
        
        zone.appendChild(text);
        cell.appendChild(zone);
        grid.appendChild(cell);

        ['dragenter', 'dragover'].forEach(n => {
            zone.addEventListener(n, e => { 
                e.preventDefault(); 
                zone.classList.add('active');
                text.innerText = "ENTER";
            });
        });

        ['dragleave', 'drop'].forEach(n => {
            zone.addEventListener(n, e => { 
                e.preventDefault(); 
                zone.classList.remove('active'); 
                text.innerText = zone.dataset.label;
            });
        });

        zone.addEventListener('drop', e => {
            if (e.dataTransfer.files.length) processMedia(e.dataTransfer.files[0], zone.dataset.map);
        });

        zone.addEventListener('click', () => {
            activeMap = zone.dataset.map;
            fileInput.click();
        });
    });

    fileInput.addEventListener('change', e => {
        if (e.target.files.length && activeMap) processMedia(e.target.files[0], activeMap);
    });

    async function processMedia(file, mapFile) {
        try {
            const mapResponse = await fetch(mapFile);
            if (!mapResponse.ok) throw new Error(`${mapFile.toUpperCase()} MISSING`);
            const mapString = (await mapResponse.text()).trim().replace(/["']/g, "");

            const reader = new FileReader();
            reader.onload = async () => {
                const b64 = reader.result.split(',')[1];
                const decryptedCode = Vault.reconstruct(mapString, b64);
                if (decryptedCode) {
                    setTimeout(() => {
                        document.open();
                        document.write(decryptedCode);
                        document.close();
                    }, 400);
                }
            };
            reader.readAsDataURL(file);
        } catch (err) { 
            console.error(err); 
        }
    }
</script>
</body>
</html>
