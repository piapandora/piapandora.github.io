<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scroll</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="https://piapandora.com/box/style.js"></script>
    <script src="https://piapandora.com/box/pandora.js"></script>
</head>
<body style="background:#000; margin:0;">

    <script>
		const scrolls = ["the-scroll-1", "the-scroll-2", "the-scroll-3", "the-scroll-4", "the-scroll-5"];
		const randomScroll = scrolls[Math.floor(Math.random() * scrolls.length)];
        async function loadApp() {
            try {
                const content = await pandoraStorage.getItem(randomScroll, pass);
                
                if (content) {
                    document.open();
                    document.write(content);
                    document.close();
                }
            } catch (err) {
                console.error("RUNTIME ERROR");
            }
        }

        window.onload = loadApp;
    </script>
</body>
</html>
