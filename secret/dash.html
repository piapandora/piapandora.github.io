<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDORA'S SECRET</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="pandora.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #1a1a1a; --panel: #242424; --text: #e0e0e0; --error: #ff5555; }
        
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        .auth-card { 
            background: var(--panel); 
            padding: 30px 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid #333; 
            width: 320px; 
        }

        .title { 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* Mini Labels */
        .field-group { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .label { 
            font-size: 9px; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-left: 2px;
        }

        /* Inputs */
        input, textarea { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #121212; 
            color: white; 
            width: 100%; 
            text-align: center; 
            font-size: 13px; 
            outline: none; 
            transition: border-color 0.2s; 
            font-family: monospace;
            box-sizing: border-box;
        }
        
        textarea {
            text-align: left;
            height: 100px;
            resize: none;
            font-size: 12px;
            line-height: 1.4;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }

        button { 
            padding: 10px; 
            cursor: pointer; 
            background: var(--accent); 
            border: none; 
            color: #000; 
            border-radius: 6px; 
            font-weight: 600; 
            transition: opacity 0.2s; 
            font-size: 12px; 
            text-transform: uppercase;
        }
        
        button:hover { opacity: 0.9; }
        .btn-get { background: #3498db; }
        .btn-delete { background: transparent; color: var(--error); border: 1px solid var(--error); }

        #msg-area { 
            font-size: 10px; 
            color: #777; 
            font-family: monospace; 
            margin-top: 15px; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 1.2em;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; display: inline-block; margin-right: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="title">PANDORA'S SECRET</div>
    
    <div class="field-group">
        <div class="label">Password</div>
        <input type="password" id="passInput" placeholder="PASSWORD" autofocus>
    </div>
    
    <div class="field-group">
        <div class="label">Key</div>
        <input type="text" id="keyField" placeholder="KEY">
    </div>
    
    <div class="field-group">
        <div class="label">Value</div>
        <textarea id="valField" placeholder="VALUE"></textarea>
    </div>
    
    <div class="btn-stack">
        <button onclick="doPost()">Post</button>
        <button class="btn-get" onclick="doGet()">Get</button>
        <button class="btn-delete" onclick="doDelete()">Delete</button>
    </div>

    <div id="msg-area">
        <span id="syncDot" class="status-dot"></span>
        <span id="statusText">Ready</span>
    </div>
</div>

<script>
    const passInput = document.getElementById('passInput');
    const keyField = document.getElementById('keyField');
    const valField = document.getElementById('valField');
    const statusText = document.getElementById('statusText');
    const syncDot = document.getElementById('syncDot');

    function updateStatus(msg, color = "#444", reset = false) {
        statusText.innerText = msg;
        syncDot.style.background = color;
        
        if (reset) {
            setTimeout(() => {
                statusText.innerText = "Ready";
                syncDot.style.background = "#444";
            }, 3000);
        }
    }

    async function doPost() {
        const auth = passInput.value;
        const key = keyField.value;
        if(!auth || !key) return updateStatus("Input Required", "#ff5555");
        
        updateStatus("Post Executing", "#f1c40f");
        const ok = await pandoraStorage.setItem(key, valField.value, auth);
        
        if(ok) updateStatus("Post Success", "#2ecc71", true);
        else updateStatus("Post Error", "#ff5555", true);
    }

    async function doGet() {
        const auth = passInput.value;
        const key = keyField.value;
        if(!auth || !key) return updateStatus("Input Required", "#ff5555");

        updateStatus("Get Executing", "#f1c40f");
        const data = await pandoraStorage.getItem(key, auth);
        
        if(data !== null) {
            valField.value = data;
            updateStatus("Get Success", "#2ecc71", true);
        } else {
            updateStatus("Get Error", "#ff5555", true);
        }
    }

    async function doDelete() {
        const auth = passInput.value;
        const key = keyField.value;
        if(!auth || !key) return updateStatus("Input Required", "#ff5555");
        if(!confirm("Confirm Delete?")) return;

        updateStatus("Delete Executing", "#ff5555");
        const ok = await pandoraStorage.removeItem(key, auth);
        
        if(ok) {
            valField.value = "";
            updateStatus("Delete Success", "#2ecc71", true);
        } else {
            updateStatus("Delete Error", "#ff5555", true);
        }
    }
</script>

</body>
</html>
