<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GREEN SNAKES</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <style>
        body, html { margin: 0; padding: 0; background: #050505; overflow: hidden; height: 100vh; }
        canvas { display: block; filter: blur(1px) contrast(1.2); }
        /* Added for the cursor hide feature */
        .hide-cursor { cursor: none; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        // --- NEW FEATURES ---
        let cursorTimer;
        
        // Hide cursor after 1 second of inactivity
        window.addEventListener('mousemove', () => {
            document.body.classList.remove('hide-cursor');
            clearTimeout(cursorTimer);
            cursorTimer = setTimeout(() => {
                document.body.classList.add('hide-cursor');
            }, 1000);
        });

        // Double click to toggle fullscreen
        window.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        });
        // --------------------

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, w, h);
            particles = Array.from({length: 800}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                speed: 1 + Math.random() * 2,
                angle: Math.random() * Math.PI * 2
            }));
        }

        function draw() {
            // Very subtle fade for high-persistence trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.01)';
            ctx.fillRect(0, 0, w, h);

            particles.forEach(p => {
                // The "Cerebral" Logic: Perlin-like noise simulation
                p.angle += (Math.random() - 0.5) * 0.5;
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;

                // Border wrapping
                if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
                if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;

                ctx.fillStyle = '#00ff41';
                ctx.fillRect(p.x, p.y, 1.5, 1.5);
            });

            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
