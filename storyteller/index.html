<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyteller by Pia Pandora</title>
    <link rel="icon" type="image/png" href="https://www.piapandora.com/tickletrio/misc/icons8-feather-55.png">
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #181b24;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #2e3440;
            --input-bg: #0d0e12;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.75rem;
            letter-spacing: -0.025em;
            color: #fff;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .section-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-card, .beat-card {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.75rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            position: relative;
        }

        .card-header {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h4 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
        }

        .full-width {
            grid-column: span 2;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .beat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            position: relative;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }

        .beats-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        button.add-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px dashed var(--accent);
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.75rem;
            width: 100%;
        }

        button.add-btn:hover:not(:disabled) {
            background-color: rgba(99, 102, 241, 0.1);
        }

        button.add-btn:disabled {
            border-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.main-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1.5rem;
            width: 100%;
        }

        button.main-btn:hover {
            background-color: var(--accent-hover);
        }

        .output-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button.copy-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.4rem 0.85rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.copy-btn:hover {
            background-color: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        pre {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
            color: #a5b4fc;
            max-height: 450px;
            overflow-y: auto;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        pre::-webkit-scrollbar {
            width: 8px;
        }
        pre::-webkit-scrollbar-track {
            background: var(--input-bg);
        }
        pre::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        pre.flash-copy {
            background-color: #2e3856 !important;
            border-color: #818cf8 !important;
        }

        @media (max-width: 768px) {
            .item-card {
                grid-template-columns: 1fr;
            }
            .card-header, .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STORYTELLER by Pia Pandora</h1>
        <p>Craft epic stories from characters, locations, and story beats.</p>
    </header>

    <form id="storyForm" onsubmit="event.preventDefault(); generatePrompt();">
        <!-- SECTION 1: STORY -->
        <div class="section-header">1. STORY</div>
        <div class="item-card" style="margin-top: 0.5rem;">
            <div class="field-group full-width">
                <label for="storyType">Story Structure</label>
                <select id="storyType" onchange="updateKeywordsPlaceholder()"></select>
            </div>
            <div class="field-group full-width">
                <label for="keywords">Atmospheric Keywords & Style Cues</label>
                <input type="text" id="keywords" placeholder="Atmospheric cues and style details">
            </div>
        </div>

        <!-- SECTION 2: CHARACTERS -->
        <div class="section-header">2. CHARACTERS</div>
        <div id="characterSlots"></div>
        <button type="button" class="add-btn" id="addCharBtn" onclick="addCharacterSlot()">+ Add Character Slot</button>

        <!-- SECTION 3: LOCATIONS -->
        <div class="section-header">3. LOCATIONS</div>
        <div id="locationSlots"></div>
        <button type="button" class="add-btn" id="addLocBtn" onclick="addLocationSlot()">+ Add Location Slot</button>

        <!-- SECTION 4: BEATS -->
        <div class="section-header">4. BEATS</div>
        <div class="beats-list" id="beatSlots"></div>
        <button type="button" class="add-btn" id="addBeatBtn" onclick="addBeatSlot()">+ Add Beat Slot</button>

        <button type="submit" class="main-btn">Generate Story Prompt</button>
    </form>

    <div class="output-container">
        <div class="output-header">
            <label>Story Prompt</label>
            <button type="button" class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy Prompt</button>
        </div>
        <pre id="promptOutput">Fill in any fields above and click "Generate Story Prompt"...</pre>
    </div>
</div>

<script>
    // Capacity Caps & State Tracking
    let charCount = 0;
    const MAX_CHARS = 12;

    let locCount = 0;
    const MAX_LOCS = 10;

    let beatCount = 0;
    const MAX_BEATS = 20;

    // Single Source of Truth: Story Types
    const storyTypes = [
        {
            id: 'the_quest',
            optionText: 'The Quest / Search (Intentional Mission)',
            label: 'The Quest / Search',
            keywords: 'Vast landscapes, quiet determination, sensory depth, atmospheric travel'
        },
        {
            id: 'voyage_return',
            optionText: 'Voyage & Return (Accidental Portal/Realm Shift)',
            label: 'Voyage & Return',
            keywords: 'Wonder, disorientation, contrasting textures, vivid surrealism'
        },
        {
            id: 'mystery_discovery',
            optionText: 'The Mystery / Discovery (Uncovering Hidden Truth)',
            label: 'The Mystery / Discovery',
            keywords: 'Sharply observed details, lingering shadows, quiet tension, understated subtext'
        },
        {
            id: 'overcoming_monster',
            optionText: 'Overcoming the Monster (Confronting Threat/Invader)',
            label: 'Overcoming the Monster',
            keywords: 'High-contrast atmospheres, visceral presence, escalating tension, sharp focus'
        },
        {
            id: 'discovery_self',
            optionText: 'Discovery of Self (Internal Growth & Hidden Potential)',
            label: 'Discovery of Self',
            keywords: 'Introspective pacing, subtle emotional resonance, tactile surroundings, quiet clarity'
        }
    ];

    function getStoryType(id) {
        return storyTypes.find(t => t.id === id);
    }

    function getStoryTypeOptions() {
        return storyTypes.map(t => `<option value="${t.id}">${t.optionText}</option>`).join('');
    }

    function populateStoryTypes() {
        const storySelect = document.getElementById('storyType');
        if (storySelect) {
            storySelect.innerHTML = getStoryTypeOptions();
        }
    }

    function updateKeywordsPlaceholder() {
        const selectedTypeId = document.getElementById('storyType').value;
        const selectedType = getStoryType(selectedTypeId);
        const keywordsInput = document.getElementById('keywords');
        if (selectedType && keywordsInput) {
            keywordsInput.placeholder = `Default: ${selectedType.keywords}`;
        }
    }

    // Roles
    const roles = [
        { id: 'hero_main', label: 'Hero (Main)' },
        { id: 'hero_secondary', label: 'Hero (Secondary)' },
        { id: 'ally', label: 'Ally / Companion' },
        { id: 'mentor', label: 'Mentor / Guide' },
        { id: 'rival', label: 'Rival' },
        { id: 'villain_main', label: 'Villain (Main)' },
        { id: 'villain_secondary', label: 'Villain (Secondary)' },
        { id: 'minion', label: 'Minion / Henchman' },
        { id: 'npc', label: 'NPC / Other' }
    ];

    function getRoleLabel(id) {
        return roles.find(r => r.id === id)?.label ?? id;
    }

    function getRoleOptions() {
        return roles.map(r => `<option value="${r.id}">${r.label}</option>`).join('');
    }

    // Randomize Story-Type on Page Load
    function randomizeStoryType() {
        const storySelect = document.getElementById('storyType');
        if (storySelect && storySelect.options.length > 0) {
            const randomIndex = Math.floor(Math.random() * storySelect.options.length);
            storySelect.selectedIndex = randomIndex;
            updateKeywordsPlaceholder();
        }
    }

    // Add Character Slot
    function addCharacterSlot() {
        if (charCount >= MAX_CHARS) return;
        
        const charContainer = document.getElementById('characterSlots');
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="card-header">
                <h4 class="char-title">Character Slot ${charContainer.children.length + 1}</h4>
                <button type="button" class="remove-btn" onclick="removeCard(this, 'char')" title="Remove Character">×</button>
            </div>
            <div class="field-group">
                <label>Name</label>
                <input type="text" class="char-name" placeholder="Name">
            </div>
            <div class="field-group">
                <label>Role</label>
                <select class="char-role">${getRoleOptions()}</select>
            </div>
            <div class="field-group">
                <label>Description / Traits</label>
                <input type="text" class="char-desc" placeholder="Traits and details">
            </div>
            <div class="field-group">
                <label>Motivation / Goal</label>
                <input type="text" class="char-goal" placeholder="Core motivation">
            </div>
        `;
        charContainer.appendChild(card);
        charCount = charContainer.children.length;

        if (charCount >= MAX_CHARS) {
            const btn = document.getElementById('addCharBtn');
            btn.disabled = true;
            btn.textContent = `Maximum Characters Reached (${MAX_CHARS}/${MAX_CHARS})`;
        }
    }

    // Add Location Slot
    function addLocationSlot() {
        if (locCount >= MAX_LOCS) return;

        const locContainer = document.getElementById('locationSlots');
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="card-header">
                <h4 class="loc-title">Location Slot ${locContainer.children.length + 1}</h4>
                <button type="button" class="remove-btn" onclick="removeCard(this, 'loc')" title="Remove Location">×</button>
            </div>
            <div class="field-group">
                <label>Location Name</label>
                <input type="text" class="loc-name" placeholder="Location name">
            </div>
            <div class="field-group">
                <label>Description & Sensory Details</label>
                <input type="text" class="loc-desc" placeholder="Sensory details">
            </div>
        `;
        locContainer.appendChild(card);
        locCount = locContainer.children.length;

        if (locCount >= MAX_LOCS) {
            const btn = document.getElementById('addLocBtn');
            btn.disabled = true;
            btn.textContent = `Maximum Locations Reached (${MAX_LOCS}/${MAX_LOCS})`;
        }
    }

    // Add Beat Slot
    function addBeatSlot() {
        if (beatCount >= MAX_BEATS) return;

        const beatsContainer = document.getElementById('beatSlots');
        const card = document.createElement('div');
        card.className = 'beat-card';
        card.innerHTML = `
            <div class="card-header">
                <label class="beat-title">Beat ${beatsContainer.children.length + 1}</label>
                <button type="button" class="remove-btn" onclick="removeCard(this, 'beat')" title="Remove Beat">×</button>
            </div>
            <input type="text" class="beat-input" placeholder="Action or turning point">
        `;
        beatsContainer.appendChild(card);
        beatCount = beatsContainer.children.length;

        if (beatCount >= MAX_BEATS) {
            const btn = document.getElementById('addBeatBtn');
            btn.disabled = true;
            btn.textContent = `Maximum Beats Reached (${MAX_BEATS}/${MAX_BEATS})`;
        }
    }

    // Remove Card Handler & Precise Renumbering
    function removeCard(btn, type) {
        const card = btn.closest('.item-card, .beat-card');
        if (!card) return;
        card.remove();

        if (type === 'char') {
            const charContainer = document.getElementById('characterSlots');
            charCount = charContainer.children.length;
            const charBtn = document.getElementById('addCharBtn');
            charBtn.disabled = false;
            charBtn.textContent = '+ Add Character Slot';
            
            document.querySelectorAll('#characterSlots .char-title').forEach((title, index) => {
                title.textContent = `Character Slot ${index + 1}`;
            });
        } else if (type === 'loc') {
            const locContainer = document.getElementById('locationSlots');
            locCount = locContainer.children.length;
            const locBtn = document.getElementById('addLocBtn');
            locBtn.disabled = false;
            locBtn.textContent = '+ Add Location Slot';
            
            document.querySelectorAll('#locationSlots .loc-title').forEach((title, index) => {
                title.textContent = `Location Slot ${index + 1}`;
            });
        } else if (type === 'beat') {
            const beatsContainer = document.getElementById('beatSlots');
            beatCount = beatsContainer.children.length;
            const beatBtn = document.getElementById('addBeatBtn');
            beatBtn.disabled = false;
            beatBtn.textContent = '+ Add Beat Slot';
            
            document.querySelectorAll('#beatSlots .beat-title').forEach((title, index) => {
                title.textContent = `Beat ${index + 1}`;
            });
        }
    }

    function generatePrompt() {
        const selectedTypeId = document.getElementById('storyType').value;
        const selectedStoryType = getStoryType(selectedTypeId);
        const selectedTypeDisplay = selectedStoryType?.label || 'The Quest / Search';
        const keywords = document.getElementById('keywords').value.trim() || selectedStoryType?.keywords || "Rich sensory details, immersive prose";

        // Collect Characters
        const charCards = document.querySelectorAll('#characterSlots .item-card');
        const activeChars = [];
        charCards.forEach(card => {
            const name = card.querySelector('.char-name').value.trim();
            const roleId = card.querySelector('.char-role').value;
            const roleDisplay = getRoleLabel(roleId);
            const desc = card.querySelector('.char-desc').value.trim();
            const goal = card.querySelector('.char-goal').value.trim();

            if (name || desc) {
                const charName = name || "Unnamed Character";
                const descText = desc ? `: ${desc}` : "";
                const goalText = goal ? ` (Motivation: ${goal})` : "";
                activeChars.push(`- [${roleDisplay}] ${charName}${descText}${goalText}`);
            }
        });

        // Collect Locations
        const locCards = document.querySelectorAll('#locationSlots .item-card');
        const activeLocs = [];
        locCards.forEach(card => {
            const name = card.querySelector('.loc-name').value.trim();
            const desc = card.querySelector('.loc-desc').value.trim();

            if (name || desc) {
                const locName = name || "Unnamed Location";
                activeLocs.push(`- ${locName}: ${desc || 'No specific description provided'}`);
            }
        });

        // Collect Beats
        const beatInputs = document.querySelectorAll('.beat-input');
        const activeBeats = [];
        beatInputs.forEach(input => {
            const val = input.value.trim();
            if (val) {
                activeBeats.push(val);
            }
        });

        // Format Blocks
        const charBlock = activeChars.length > 0 ? activeChars.join('\n') : '- No specific characters defined; infer standard archetypes.';
        const locBlock = activeLocs.length > 0 ? activeLocs.join('\n') : '- No specific locations defined; generate fitting environments.';
        const beatsBlock = activeBeats.length > 0 
            ? activeBeats.map((b, idx) => `${idx + 1}. ${b}`).join('\n')
            : 'No required beats provided; construct an organic plot arc.';

        const constructedPrompt = `SYSTEM DIRECTIVE:
        You are an expert fiction author specializing in immersive, atmospheric, literary fiction. Write a complete, evocative short story based on the specifications below. Prioritize sensory depth, organic pacing, and subtext over quick plot progression, formulaic beats, or high-concept summary.

        CAST OF CHARACTERS:
        ${charBlock}

        WORLD & LOCATIONS:
        ${locBlock}

        NARRATIVE SPECIFICATIONS:
        - Structural Archetype: ${selectedTypeDisplay}
        - Required Story Beats (Execute in sequence):
        ${beatsBlock}
        - Atmospheric Keywords & Style Cues: ${keywords}

        WRITING GUIDELINES:

        1. ATMOSPHERIC & TACTILE HOOK:
        Open immediately with a grounded, sensory observation of the physical world — texture, weather, material wear, the body's relationship to its surroundings. Do not open with a floating action, a meta-introduction, or a scene-setting summary.

        2. DIALOGUE DISCIPLINE ON THE OPEN:
        Dialogue may only open the story if it does real work immediately — establishing voice, place, or dramatic tension in the first line. Never open on generic conversational dialogue ("So, are we really doing this?") used only to stall before the real scene starts.

        3. MATERIAL WEIGHT & GROUNDED STAKES:
        Treat the world as tangible and physically coherent. In every scene, ground at least two of the following in concrete, specific detail: a tool or object in use, a garment or its wear, a weather or light condition, a physical exertion or strain. Favor concrete nouns and precise verbs over abstraction. Let scenes unfold in real time through action and choice rather than being summarized after the fact.

        4. SUBTEXT OVER STATEMENT (CRITICAL):
        Characters must NEVER state their motivations, arcs, or internal conflicts outright in dialogue. Do not write lines like "I'm not a child anymore!" or "I need to prove myself." Instead, express motivation entirely through physical choices, habits, refusals, and unspoken friction — what a character does with their hands, what they insist on carrying themselves, what they won't say out loud. The reader should infer the motivation; it should never be announced.

        5. PROSE RHYTHM & TEXTURE:
        Vary sentence and paragraph length to track emotional and physical intensity — short and clipped under tension, longer and reflective in quieter passages. Avoid repeated sentence openings, recycled imagery, or a uniform cadence throughout.

        6. CHARACTER AGENCY & CAUSALITY:
        Every major development must arise from a character's choice made in keeping with their established motivations and knowledge — not from author convenience or coincidence. Coincidence may complicate a situation; it must never resolve one.

        7. FIVE-MOVEMENT PACING (INTERNAL ONLY):
        Structure the narrative internally around five movements — status quo, threshold, escalation, climax, resolution — but do NOT label them. No "Act 1," no headings that name a movement's dramatic function. If you use section breaks at all, keep them to a plain, unlabeled mark (a blank line, a scene divider, or a bare numeral) — never a header that tells the reader what the scene is "for."

        8. RESOLUTION WITHOUT OVER-EXPLANATION:
        Resolve the central conflict concretely, but resist tying off every emotional thread. Prefer earned implication to exhaustive explanation — let some consequences and uncertainties remain after the last scene.

        Begin the story immediately with no conversational preface, meta-commentary, or explanation.`;

        const outputPre = document.getElementById('promptOutput');
        outputPre.textContent = constructedPrompt;

        // Smooth scroll down to output for mobile responsiveness
        outputPre.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function triggerCopyFeedback() {
        const outputPre = document.getElementById('promptOutput');
        const copyBtn = document.getElementById('copyBtn');
        const originalText = copyBtn.textContent;

        outputPre.classList.add('flash-copy');
        copyBtn.textContent = 'Copied ✓';

        setTimeout(() => {
            outputPre.classList.remove('flash-copy');
        }, 300);

        setTimeout(() => {
            copyBtn.textContent = originalText;
        }, 1500);
    }

    function copyPrompt() {
        const outputPre = document.getElementById('promptOutput');
        const outputText = outputPre.textContent;
        if (!outputText || outputText.startsWith("Fill in any fields")) return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(outputText).then(() => {
                triggerCopyFeedback();
            }).catch(() => {
                fallbackCopyText(outputText);
            });
        } else {
            fallbackCopyText(outputText);
        }
    }

    function fallbackCopyText(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            triggerCopyFeedback();
        } catch (err) {
            console.error('Fallback copy failed', err);
        }
        document.body.removeChild(textArea);
    }

    // Safe Page Initialization
    document.addEventListener('DOMContentLoaded', () => {
        populateStoryTypes();
        randomizeStoryType();
        addCharacterSlot();
        addLocationSlot();
        addBeatSlot();
    });
</script>
</body>
</html>
