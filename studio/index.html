<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIA STUDIO // FLUX</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fafafa; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        /* Layout Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .column-border { border-color: #18181b; }

        /* Smooth Image Transitions */
        #main-img { 
            transition: opacity 0.5s ease-in-out; 
            will-change: opacity;
        }

        /* Fixed the Shadow Syntax */
        .canvas-shadow { 
            box-shadow: 0 0 100px rgba(255, 77, 77, 0.08); 
        }

        .studio-bg {
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="flex flex-row">

    <aside class="w-1/4 min-w-[320px] border-r column-border bg-zinc-950 flex flex-col z-30">
        <header class="p-6 border-b column-border flex items-center justify-between bg-black">
            <div class="flex flex-col">
                <span class="text-[10px] tracking-[0.5em] font-black text-primary uppercase">Pia Studio</span>
                <span id="fingerprint" class="text-[9px] text-zinc-600 font-mono mt-1">ID: ----</span>
            </div>
            <div class="badge badge-primary badge-outline text-[8px] font-bold tracking-widest px-3">FLUX.1</div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
            <div class="form-control">
                <label class="label pt-0 pb-1">
                    <span class="label-text text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-500">Vault Access</span>
                </label>
                <input type="password" id="vaultPass" placeholder="••••••••" 
                       class="input input-bordered input-sm bg-black border-zinc-800 focus:border-primary text-white" />
            </div>

            <div class="form-control">
                <label class="label pt-0 pb-1">
                    <span class="label-text text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-500">Core Concept</span>
                </label>
                <textarea id="promptInput" class="textarea textarea-bordered h-24 bg-black border-zinc-800 focus:border-primary text-sm leading-relaxed resize-none" 
                          placeholder="Describe the action, clothing, or environment..."></textarea>
            </div>

            <div class="form-control">
                <label class="label pt-0 pb-1">
                    <span class="label-text text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-500">Dimensions (H × W)</span>
                </label>
                <div class="flex items-center gap-3">
                    <input type="number" id="heightInput" value="1024" class="input input-bordered input-sm w-full bg-black border-zinc-800 text-center" />
                    <span class="text-zinc-700 font-bold">×</span>
                    <input type="number" id="widthInput" value="768" class="input input-bordered input-sm w-full bg-black border-zinc-800 text-center" />
                </div>
            </div>

            <div class="form-control">
                <label class="label pt-0 pb-1">
                    <span class="label-text text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-500">Fixed Aesthetic</span>
                </label>
                <textarea id="styleInput" 
                        class="textarea textarea-bordered h-16 bg-black border-zinc-800 focus:border-primary text-sm leading-relaxed resize-none">cute red-haired girl with double-braids, high detail skin, 8k</textarea>
            </div>

            <button id="genBtn" onclick="generate()" class="btn btn-primary btn-block no-animation text-[10px] tracking-[0.3em] uppercase font-black mt-4">
                Initiate Render
            </button>
        </div>
        
        <footer class="p-4 border-t column-border bg-black text-center">
            <p class="text-[8px] text-zinc-700 tracking-[0.4em] uppercase font-bold">System Online</p>
        </footer>
    </aside>

    <section class="w-1/2 h-full bg-black relative flex items-center justify-center p-12 studio-bg">
        <div id="canvas-wrap" class="relative max-w-full max-h-full">
            
            <div id="loader" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/60 backdrop-blur-md rounded-lg border border-white/5">
                <span class="loading loading-infinity loading-lg text-primary"></span>
                <p class="mt-4 text-[9px] tracking-[0.6em] text-primary uppercase font-black animate-pulse">Manifesting</p>
            </div>
            
            <img id="main-img" src="" class="max-w-full max-h-[85vh] object-contain rounded-sm canvas-shadow opacity-0" />
            
            <div id="empty-ui" class="text-center opacity-20 hover:opacity-40 transition-opacity cursor-default">
                <h2 class="text-zinc-100 text-[10vw] font-black tracking-tighter leading-none select-none">PIA</h2>
                <p class="text-zinc-400 text-[10px] tracking-[1.2em] uppercase mt-4">Ready for input</p>
            </div>
        </div>
    </section>

    <aside class="w-1/4 min-w-[280px] border-l column-border bg-zinc-950 flex flex-col z-30">
        <header class="p-6 border-b column-border bg-black">
            <span class="text-[9px] uppercase tracking-[0.4em] font-black text-zinc-500">Session History</span>
        </header>

        <div id="history-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 auto-rows-min gap-4 no-scrollbar">
            </div>
    </aside>

    <script>
        const MAP_STRING = "21,95,42,7,245,131,206,254,239,224,240,119,214,111,202,65,36,246,76,59,158,229,188,133,112,163,57,22,83,121,120,91,56,202,202";

        const vaultPass = document.getElementById('vaultPass');
        const fingerprint = document.getElementById('fingerprint');
        const genBtn = document.getElementById('genBtn');
        const mainImg = document.getElementById('main-img');
        const loader = document.getElementById('loader');
        const emptyUI = document.getElementById('empty-ui');
        const historyGrid = document.getElementById('history-grid');

        // Update ID fingerprint as user types
        vaultPass.addEventListener('input', () => {
            if (typeof Vault !== 'undefined') {
                const fp = Vault.fingerprint(vaultPass.value);
                fingerprint.innerText = `ID: ${fp}`;
            }
        });

        async function generate() {
            const pass = vaultPass.value;
            if (!pass) {
                alert("Vault decryption key required.");
                return;
            }

            let apiKey = "";
            try {
                apiKey = Vault.reconstruct(MAP_STRING, pass);
                if (!apiKey) throw new Error();
            } catch (e) {
                alert("Access denied. Incorrect vault password.");
                return;
            }

            const prompt = document.getElementById('promptInput').value || "meditative gaze";
            const style = document.getElementById('styleInput').value.replace(/\n/g, ', ');
            const h = document.getElementById('heightInput').value;
            const w = document.getElementById('widthInput').value;
            
            const fullPrompt = `${prompt}, ${style}`;
            const seed = Math.floor(Math.random() * 9000000) + 1000000;

            // UI Feedback
            genBtn.disabled = true;
            genBtn.innerText = "Processing...";
            loader.classList.remove('hidden');
            emptyUI.classList.add('hidden');
            mainImg.style.opacity = '0';

            try {
                const response = await fetch(`https://gen.pollinations.ai/image/${encodeURIComponent(fullPrompt)}?model=flux&seed=${seed}&width=${w}&height=${h}&nologo=true`, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });

                if (!response.ok) throw new Error("Connection Failure");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                mainImg.src = url;
                mainImg.onload = () => {
                    loader.classList.add('hidden');
                    mainImg.style.opacity = '1';
                    genBtn.disabled = false;
                    genBtn.innerText = "Initiate Render";
                    addToHistory(url);
                };
            } catch (err) {
                alert("Studio Error: " + err.message);
                genBtn.disabled = false;
                genBtn.innerText = "Retry Render";
                loader.classList.add('hidden');
            }
        }

        function addToHistory(url) {
            const container = document.createElement('div');
            container.className = "aspect-square bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden cursor-pointer hover:border-primary transition-all active:scale-95 group shadow-lg";
            container.innerHTML = `<img src="${url}" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity">`;
            
            container.onclick = () => {
                mainImg.src = url;
                mainImg.style.opacity = '1';
                emptyUI.classList.add('hidden');
            };

            historyGrid.prepend(container);
            if (historyGrid.children.length > 20) historyGrid.lastChild.remove();
        }

        // Hotkeys (Cmd/Ctrl + Enter)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                generate();
            }
        });
    </script>
</body>
</html>
