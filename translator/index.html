<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator 64</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            background: #121212;
            color: #e0e0e0;
            transition: background 0.6s ease;
        }
        body.friday-mode { background: #000000; }

        .container { 
            background: #1e1e1e; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid #333;
            transition: all 0.6s ease;
        }
        body.friday-mode .container {
            background: #0a0a0a;
            border-color: #ff4444;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
        }

        h2 { text-align: center; color: #bb86fc; margin-top: 0; cursor: default; user-select: none; }
        body.friday-mode h2 { color: #ff4444; }

        textarea { 
            width: 100%; 
            height: 120px; 
            margin: 10px 0; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #444; 
            border-radius: 8px; 
            background: #2d2d2d; 
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical; 
            transition: border 0.3s;
        }
        textarea:focus { outline: 2px solid #03dac6; border-color: transparent; }
        body.friday-mode textarea { background: #000; border-color: #222; }
        body.friday-mode textarea:focus { outline: 2px solid #990000; }
        
        .buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        button { 
            flex: 1; 
            padding: 14px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            color: #000; 
            font-weight: bold; 
            transition: opacity 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .encode { background-color: #bb86fc; }
        .decode { background-color: #03dac6; }
        body.friday-mode .encode { background-color: #990000; color: #fff; }
        body.friday-mode .decode { background-color: #333; color: #fff; }

        button:hover { opacity: 0.8; }
        .error { color: #cf6679; font-size: 0.85rem; margin-top: 5px; min-height: 1.2em; font-weight: bold; }
        label { font-size: 0.9rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="header" onclick="checkFriday()">String / Base64 Translator</h2>
        
    <label for="input">Input</label>
    <textarea id="input" placeholder="Paste your string here..."></textarea>
        
    <div class="buttons">
        <button class="encode" onclick="handleConvert('encode')">Encode</button>
        <button class="decode" onclick="handleConvert('decode')">Decode</button>
    </div>
        
    <p id="error" class="error"></p>
        
    <label for="output">Result</label>
    <textarea id="output" placeholder="Translation will appear here..." readonly></textarea>
</div>

<script>
    let clickCount = 0;
    let fridayMode = false;

    function checkFriday() {
        if (fridayMode) return; 
        clickCount++;
        if (clickCount === ((1 << 3) | (1 << 2) | 1)) {
            fridayMode = true;
            document.body.classList.add('friday-mode');
            document.getElementById('header').innerText = "Friday Decoder";
        }
    }

    function handleConvert(mode) {
        let val = document.getElementById('input').value.trim();
        const output = document.getElementById('output');
        const error = document.getElementById('error');
        error.innerText = "";

        if (!val) {
            error.innerText = "Please enter some text first!";
            return;
        }

        const iterations = fridayMode ? ((1 << 3) | (1 << 2) | 1) : 1;

        try {
            for (let i = 0; i < iterations; i++) {
                val = (mode === 'encode') ? btoa(val) : atob(val);
            }
            output.value = val;
        } catch (e) {
            error.innerText = fridayMode ? "Error: Friday chain failed." : "Error: Invalid format.";
            output.value = "";
        }
    }
</script>

</body>
</html>
