<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator 64</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            background: #121212;
            color: #e0e0e0;
        }
        .container { 
            background: #1e1e1e; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid #333;
        }
        h2 { text-align: center; color: #bb86fc; margin-top: 0; }
        textarea { 
            width: 100%; 
            height: 120px; 
            margin: 10px 0; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #444; 
            border-radius: 8px; 
            background: #2d2d2d; 
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical; 
        }
        textarea:focus { outline: 2px solid #03dac6; border-color: transparent; }
        .buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        button { 
            flex: 1; 
            padding: 12px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            color: #000; 
            font-weight: bold; 
            transition: opacity 0.2s;
        }
        .encode { background-color: #bb86fc; }
        .decode { background-color: #03dac6; }
        button:hover { opacity: 0.8; }
        .error { color: #cf6679; font-size: 0.85rem; margin-top: 5px; min-height: 1.2em; font-weight: bold; }
        label { font-size: 0.9rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ascii / Base64 Translator</h2>
    
    <label for="input">Input</label>
    <textarea id="input" placeholder="Paste your string here..."></textarea>
    
    <div class="buttons">
        <button class="encode" onclick="handleConvert('encode')">Encode (btoa)</button>
        <button class="decode" onclick="handleConvert('decode')">Decode (atob)</button>
    </div>
    
    <p id="error" class="error"></p>
    
    <label for="output">Result</label>
    <textarea id="output" placeholder="Translation will appear here..." readonly></textarea>
</div>

<script>
    function handleConvert(mode) {
        const input = document.getElementById('input').value.trim();
        const output = document.getElementById('output');
        const error = document.getElementById('error');
        error.innerText = "";

        if (!input) {
            error.innerText = "Please enter some text first!";
            return;
        }

        try {
            if (mode === 'encode') {
                output.value = btoa(input);
            } else {
                output.value = atob(input);
            }
        } catch (e) {
            error.innerText = "Error: Invalid format for decoding.";
            output.value = "";
        }
    }
</script>

</body>
</html>
