<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tülüş</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }

        .auth-overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; gap: 20px; transition: opacity 0.5s;
        }
        .auth-card { 
            background: var(--panel); padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; 
            flex-direction: column; align-items: center; gap: 15px; border: 1px solid #333; 
        }

        input { 
            padding: 12px; border-radius: 6px; border: 1px solid #444; 
            background: #000; color: white; width: 220px; 
            text-align: center; font-size: 16px; outline: none; 
        }
        input:focus { border-color: var(--accent); }

        button { 
            padding: 10px 24px; cursor: pointer; background: var(--accent); 
            border: none; color: #000; border-radius: 6px; 
            font-weight: 600; font-size: 14px; 
        }

        #info { font-size: 11px; color: #777; font-family: monospace; }

        /* Video Display */
        #mainVideo {
            width: 100vw;
            height: 100vh;
            display: none;
            object-fit: contain;
            background: #000;
        }

        #loading {
            display: none;
            color: var(--accent);
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="auth" class="auth-overlay">
    <div class="auth-card">
        <div style="font-weight: 600; font-size: 18px; color: var(--accent); letter-spacing: 1px;">TÜLÜŞ VIDEO</div>
        <input type="password" id="passInput" placeholder="password" autofocus>
        <div id="info">ID: <span id="fp">----</span></div>
        <button id="unlockBtn">Unlock & Play</button>
        <div id="loading">DECRYPTING...</div>
    </div>
</div>

<video id="mainVideo" controls></video>

<script>
    const passInput = document.getElementById('passInput');
    const fpDisplay = document.getElementById('fp');
    const unlockBtn = document.getElementById('unlockBtn');
    const loading = document.getElementById('loading');
    const video = document.getElementById('mainVideo');

    // Update Fingerprint as she types
    passInput.addEventListener('input', (e) => {
        fpDisplay.innerText = Vault.fingerprint(e.target.value);
    });

    // Audio Booster (Gain 2.0)
    function boostAudio(videoElement, multiplier = 5.0) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(videoElement);
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = multiplier;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        } catch (e) {
            console.warn("Audio boost initialization failed:", e);
        }
    }

    // Unlock logic
    unlockBtn.addEventListener('click', start);
    passInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') start(); });

    async function start() {
        const pass = passInput.value;
        if (!pass) return;

        unlockBtn.style.display = 'none';
        loading.style.display = 'block';

        try {
            // 1. Fetch map
            const response = await fetch('tulus.csv');
            const mapData = await response.text();

            // 2. Reconstruct
            const base64Data = Vault.reconstruct(mapData, pass);

            // 3. Set Source & Boost
            video.src = `data:video/mp4;base64,${base64Data}`;
            boostAudio(video, 5.0);
            
            // 4. Reveal
            document.getElementById('auth').style.opacity = '0';
            
            setTimeout(async () => {
                document.getElementById('auth').style.display = 'none';
                video.style.display = 'block';
                
                // 5. Auto-Fullscreen
                try {
                    if (video.requestFullscreen) await video.requestFullscreen();
                    else if (video.webkitRequestFullscreen) await video.webkitRequestFullscreen();
                } catch (err) {
                    console.log("Fullscreen request ignored.");
                }

                video.play();
            }, 500);

        } catch (err) {
            alert("Decryption failed. Check your password.");
            unlockBtn.style.display = 'block';
            loading.style.display = 'none';
        }
    }

    // Clean up
    video.onended = () => {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        console.log("Video complete.");
    };
</script>

</body>
</html>
