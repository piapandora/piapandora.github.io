<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vat Dis?</title>
    <link rel="icon" type="image/png" href="https://piapandora.com/box/misc/green-icon.png">
    <script src="https://piapandora.com/box/vault.js"></script>
    <script src="https://piapandora.com/box/style.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #0a0a0a; color: #ccc; line-height: 1.8; min-height: 100vh; }
        .badge { position: fixed; bottom: 24px; right: 24px; background: #111; border: 1px solid #222; padding: 8px 14px; border-radius: 20px; font-family: system-ui, sans-serif; font-size: 0.85rem; font-weight: 600; color: #2ecc71; z-index: 100; }
        .badge.complete { background: #1e8449; color: #fff; }
        .content { max-width: 640px; margin: 0 auto; padding: 40px 24px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 60px; }
        input { flex-grow: 1; background: #111; border: 1px solid #222; padding: 12px 18px; color: #2ecc71; font-family: Georgia, serif; font-size: 1.1rem; outline: none; border-radius: 4px; }
        button { background: #1e8449; color: white; border: none; padding: 0 24px; cursor: pointer; font-family: system-ui, sans-serif; font-weight: 600; border-radius: 4px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .entry { margin-bottom: 60px; }
        .new-entry { animation: fadeIn 0.8s ease-out; }
        .entry-title { color: #eee; font-size: 1.4rem; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; font-weight: bold; }
        .entry-body { color: #2ecc71; font-size: 1.1rem; text-align: justify; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #1e8449; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="progress-badge" class="badge">0% read</div>

    <article class="content">
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Identify an object..." autofocus spellcheck="false">
            <button id="submit-btn">Vat Dis?</button>
        </div>
        <div id="archive-list"></div>
    </article>

    <script>
        const state = {
            history: [],
            loading: false,
            hands: Vault.reconstruct("190,136,236,143,33,118,126,91,123,97,26,66,125,225,161,246,76,243,217,61,61,252,57,36,28,172,90,25,82,66,205,4,173,190,163,214,139,93,167,15,162,237,233,51,179,255,192,210,213", pass)
        };

        const inputEl = document.getElementById('user-input');
        const btnEl = document.getElementById('submit-btn');
        const listEl = document.getElementById('archive-list');
        const badgeEl = document.getElementById('progress-badge');

        function render() {
            btnEl.disabled = state.loading;
            
            listEl.innerHTML = state.history.map((entry, index) => {
                const titleCase = entry.q
                    .toLowerCase()
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');

                const animationClass = index === 0 ? 'new-entry' : '';

                return `
                    <div class="entry ${animationClass}"> <!-- Inject the class here -->
                        <div class="entry-title">${titleCase}:</div>
                        <p class="entry-body">${entry.a}</p>
                    </div>
                `;
            }).join('');

            setTimeout(() => inputEl.focus(), 10);
        }

        async function askAi() {
            const query = inputEl.value.trim();
            if (!query || state.loading) return;

            state.loading = true;
            btnEl.disabled = true;
            try {
                const response = await fetch("https://vat-dis.beyazkus.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-Vat-Dis-Hands": state.hands },
                    body: JSON.stringify({ thing: query })
                });
                const data = await response.json();
                state.history.unshift({ q: query, a: data.answer });
                inputEl.value = '';
            } catch (err) {
                state.history.unshift({ q: query, a: "The archive is silent..." });
            } finally {
                state.loading = false;
                render();
            }
        } 

        btnEl.addEventListener('click', askAi);
        inputEl.addEventListener('keypress', (e) => e.key === 'Enter' && askAi());

        window.addEventListener('scroll', () => {
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? Math.round((window.scrollY / docHeight) * 100) : 0;
            badgeEl.innerText = progress >= 100 ? "✓ Complete" : `${progress}% read`;
            badgeEl.classList.toggle('complete', progress >= 100);
        });

        setTimeout(() => inputEl.focus(), 50);
    </script>
</body>
</html>
